adapter_policy:
  id: codex-exec-safe
  provider: codex-exec
  command: codex
  role: implementer
  effort: high
  args:
    - --sandbox
    - workspace-write
    - --ephemeral
    - -c
    - 'approval_policy="never"'
    - -c
    - 'model_reasoning_effort="high"'
    - -c
    - sandbox_workspace_write.network_access=false
  model: gpt-5
  requested_model: gpt-5
  timeout_seconds: 900
  max_iterations: 1
  allowed_tools: []
  denied_tools:
    - git push
    - gh pr create
    - gh issue create
    - --no-verify
  transcript_path: .specflow/runs/<slug>/adapter/codex-stage.jsonl
  output_path: .specflow/runs/<slug>/adapter/codex-stage-final.md
  dry_run: true
  never_without_human:
    - git push
    - open PR
    - merge
    - --no-verify
    - override contract
